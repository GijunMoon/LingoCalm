<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LingoCalm - Add Word</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    body {
      font-family: "Lexend", sans-serif;
      background: #f8f3e1;
      color: #2d3327;
      min-height: 100dvh;
    }
  </style>
</head>
<body class="max-w-2xl mx-auto px-5 py-6">
  <header class="mb-6">
    <a href="/dashboard" class="text-sm font-semibold text-[#55603d] hover:underline">Back</a>
    <h1 class="text-3xl font-bold mt-2">Add New Word</h1>
    <p class="text-sm text-[#2d3327]/70 mt-1">Choose category mode: auto, existing category, or new category.</p>
  </header>

  <form id="word-form" class="space-y-4 rounded-2xl bg-white/60 border border-[#aeb784]/20 p-5">
    <div>
      <label for="word" class="block text-sm font-semibold mb-1">Word / Phrase</label>
      <input id="word" type="text" class="w-full rounded-xl border-[#aeb784]/30" required />
    </div>
    <div>
      <label for="meaning" class="block text-sm font-semibold mb-1">Meaning</label>
      <textarea id="meaning" class="w-full rounded-xl border-[#aeb784]/30 min-h-24" required></textarea>
    </div>
    <div>
      <label for="language" class="block text-sm font-semibold mb-1">Language</label>
      <select id="language" class="w-full rounded-xl border-[#aeb784]/30">
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="ja">Japanese</option>
        <option value="it">Italian</option>
      </select>
    </div>

    <div>
      <label for="category-mode" class="block text-sm font-semibold mb-1">Category Mode</label>
      <select id="category-mode" class="w-full rounded-xl border-[#aeb784]/30">
        <option value="auto">Auto</option>
        <option value="existing">Select Existing</option>
        <option value="new">Create New</option>
      </select>
    </div>

    <div id="existing-category-wrapper" class="hidden">
      <label for="existing-category" class="block text-sm font-semibold mb-1">Existing Category</label>
      <select id="existing-category" class="w-full rounded-xl border-[#aeb784]/30"></select>
    </div>

    <div id="new-category-wrapper" class="hidden">
      <label for="new-category-name" class="block text-sm font-semibold mb-1">New Category Name</label>
      <input
        id="new-category-name"
        type="text"
        placeholder="e.g. travel"
        class="w-full rounded-xl border-[#aeb784]/30"
      />
    </div>

    <button
      type="submit"
      class="w-full rounded-xl bg-[#aeb784] py-3 text-white font-semibold hover:brightness-95"
    >
      Save Word
    </button>
  </form>

  <script>
    const API_BASE = window.location.origin;
    const params = new URLSearchParams(window.location.search);
    const preferredCategory = params.get("category");

    function getToken() {
      return localStorage.getItem("token");
    }

    function requireAuth() {
      if (!getToken()) {
        window.location.href = "/login";
        return false;
      }
      return true;
    }

    function authHeaders() {
      return { Authorization: `Bearer ${getToken()}` };
    }

    function parseError(data, fallback) {
      if (!data) return fallback;
      if (typeof data.detail === "string") return data.detail;
      if (Array.isArray(data.detail)) return data.detail[0]?.msg || fallback;
      return fallback;
    }

    function toggleCategoryInputs() {
      const mode = document.getElementById("category-mode").value;
      const existingWrapper = document.getElementById("existing-category-wrapper");
      const newWrapper = document.getElementById("new-category-wrapper");

      existingWrapper.classList.toggle("hidden", mode !== "existing");
      newWrapper.classList.toggle("hidden", mode !== "new");
    }

    async function loadExistingCategories() {
      const select = document.getElementById("existing-category");
      const response = await fetch(`${API_BASE}/categories`, { headers: authHeaders() });

      let data = null;
      try {
        data = await response.json();
      } catch (_) {
        data = null;
      }

      if (!response.ok) {
        throw new Error(parseError(data, "Failed to load categories"));
      }

      select.innerHTML = "";
      const categories = (data || []).map((item) => item.name).filter(Boolean);

      categories.forEach((name) => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
      });

      if (!categories.length) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "No categories";
        select.appendChild(option);
      }

      if (preferredCategory) {
        const preferred = preferredCategory.toLowerCase();
        if (!categories.includes(preferred)) {
          const option = document.createElement("option");
          option.value = preferred;
          option.textContent = preferred;
          select.appendChild(option);
        }
        select.value = preferred;
        document.getElementById("category-mode").value = "existing";
        toggleCategoryInputs();
      }
    }

    async function saveWord(payload) {
      const response = await fetch(`${API_BASE}/words`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          ...authHeaders(),
        },
        body: JSON.stringify(payload),
      });

      let data = null;
      try {
        data = await response.json();
      } catch (_) {
        data = null;
      }

      if (!response.ok) {
        throw new Error(parseError(data, "Failed to save word"));
      }

      return data;
    }

    document.getElementById("category-mode").addEventListener("change", toggleCategoryInputs);

    document.getElementById("word-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const word = document.getElementById("word").value.trim();
      const meaning = document.getElementById("meaning").value.trim();
      const language = document.getElementById("language").value;
      const mode = document.getElementById("category-mode").value;

      if (!word || !meaning || !language) {
        alert("Word, meaning, and language are required.");
        return;
      }

      const payload = {
        word_text: word,
        meaning,
        language,
        category_mode: mode,
      };

      if (mode === "existing") {
        const selected = document.getElementById("existing-category").value.trim();
        if (!selected) {
          alert("Please select an existing category.");
          return;
        }
        payload.category_name = selected;
      }

      if (mode === "new") {
        const newCategory = document.getElementById("new-category-name").value.trim();
        if (!newCategory) {
          alert("Please enter a new category name.");
          return;
        }
        payload.category_name = newCategory;
      }

      try {
        const created = await saveWord(payload);
        const targetCategory = created.category || preferredCategory || "";
        const query = targetCategory ? `?name=${encodeURIComponent(targetCategory)}` : "";
        window.location.href = `/word-list${query}`;
      } catch (error) {
        alert(error.message);
      }
    });

    (async () => {
      if (!requireAuth()) return;
      toggleCategoryInputs();
      try {
        await loadExistingCategories();
      } catch (error) {
        alert(error.message);
      }
    })();
  </script>
</body>
</html>
