<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LingoCalm - Practice Mode</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    body {
      font-family: "Lexend", sans-serif;
      background: #f8f3e1;
      color: #2d3327;
      min-height: 100dvh;
    }
  </style>
</head>
<body class="max-w-3xl mx-auto px-5 py-6">
  <header class="mb-6">
    <a href="/dashboard" class="text-sm font-semibold text-[#55603d] hover:underline">Back</a>
    <h1 class="text-3xl font-bold mt-2">Practice Mode</h1>
    <p class="text-sm text-[#2d3327]/70 mt-1">Pick category and practice with random words.</p>
  </header>

  <section class="rounded-2xl bg-white/60 border border-[#aeb784]/20 p-5 mb-4">
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
      <div>
        <label for="practice-category" class="block text-sm font-semibold mb-1">Category</label>
        <select id="practice-category" class="w-full rounded-xl border-[#aeb784]/30"></select>
      </div>
      <div>
        <label for="practice-count" class="block text-sm font-semibold mb-1">Word Count</label>
        <input id="practice-count" type="number" min="3" max="20" value="3" class="w-full rounded-xl border-[#aeb784]/30" />
      </div>
      <div class="flex items-end">
        <button
          id="start-practice-button"
          class="w-full rounded-xl bg-[#aeb784] py-2.5 text-sm font-semibold text-white hover:brightness-95"
        >
          Start Practice
        </button>
      </div>
    </div>
    <p id="practice-help" class="text-xs text-[#2d3327]/60 mt-3">Category must have at least 3 words.</p>
  </section>

  <section id="practice-result" class="space-y-3">
    <p class="text-sm text-[#2d3327]/70">No session yet. Select category and click Start Practice.</p>
  </section>

  <script>
    const API_BASE = window.location.origin;
    const params = new URLSearchParams(window.location.search);
    const initialCategory = (params.get("category") || "").toLowerCase();

    let categoryStats = [];
    let currentWords = [];
    let currentCategory = "";

    function getToken() {
      return localStorage.getItem("token");
    }

    function requireAuth() {
      if (!getToken()) {
        window.location.href = "/login";
        return false;
      }
      return true;
    }

    function authHeaders() {
      return { Authorization: `Bearer ${getToken()}` };
    }

    function parseError(data, fallback) {
      if (!data) return fallback;
      if (typeof data.detail === "string") return data.detail;
      if (Array.isArray(data.detail)) return data.detail[0]?.msg || fallback;
      return fallback;
    }

    function displayName(name) {
      if (!name) return "";
      return name.charAt(0).toUpperCase() + name.slice(1);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    async function fetchCategories() {
      const response = await fetch(`${API_BASE}/categories`, { headers: authHeaders() });
      let data = null;
      try {
        data = await response.json();
      } catch (_) {
        data = null;
      }
      if (!response.ok) {
        throw new Error(parseError(data, "Failed to load categories"));
      }
      return data;
    }

    async function fetchPracticeWords(category, count) {
      const encoded = encodeURIComponent(category);
      const response = await fetch(`${API_BASE}/practice/${encoded}?count=${count}`, {
        headers: authHeaders(),
      });
      let data = null;
      try {
        data = await response.json();
      } catch (_) {
        data = null;
      }
      if (!response.ok) {
        throw new Error(parseError(data, "Failed to load practice words"));
      }
      return data;
    }

    function renderCategorySelect() {
      const select = document.getElementById("practice-category");
      select.innerHTML = "";

      const eligible = categoryStats.filter((item) => item.count >= 3);
      if (!eligible.length) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "No categories with 3+ words";
        select.appendChild(option);
        select.disabled = true;
        document.getElementById("start-practice-button").disabled = true;
        return;
      }

      eligible.forEach((item) => {
        const option = document.createElement("option");
        option.value = item.name;
        option.textContent = `${displayName(item.name)} (${item.count})`;
        select.appendChild(option);
      });

      const initial = eligible.find((item) => item.name === initialCategory)?.name || eligible[0].name;
      select.value = initial;
    }

    function renderPracticeWords(words, category) {
      const container = document.getElementById("practice-result");
      if (!words.length) {
        container.innerHTML = "<p class='text-sm text-[#2d3327]/70'>No words found.</p>";
        return;
      }

      container.innerHTML = `
        <div class="flex items-center justify-between mb-1">
          <h2 class="text-lg font-bold">${displayName(category)} Practice</h2>
          <button
            id="toggle-meaning-button"
            class="rounded-lg border border-[#aeb784]/40 px-3 py-1.5 text-xs font-semibold text-[#55603d] hover:bg-white/40"
          >
            Hide Meanings
          </button>
        </div>
        <div id="practice-card-list" class="space-y-3"></div>
      `;

      const list = document.getElementById("practice-card-list");
      list.innerHTML = words
        .map(
          (word, index) => `
            <article class="rounded-xl border border-[#aeb784]/20 bg-white/80 p-4">
              <div class="flex items-start justify-between">
                <p class="text-sm text-[#7e8959] font-semibold">#${index + 1}</p>
                <a href="/word-details?id=${word.id}" class="text-xs text-[#55603d] hover:underline">Details</a>
              </div>
              <p class="text-2xl font-bold mt-1">${escapeHtml(word.word_text)}</p>
              <p class="meaning-line text-[#2d3327]/80 mt-2">${escapeHtml(word.meaning)}</p>
              <p class="text-xs text-[#7e8959] mt-1">${escapeHtml(word.language)}</p>
            </article>
          `
        )
        .join("");

      const toggleButton = document.getElementById("toggle-meaning-button");
      let meaningsVisible = true;
      toggleButton.addEventListener("click", () => {
        meaningsVisible = !meaningsVisible;
        document.querySelectorAll(".meaning-line").forEach((el) => {
          el.classList.toggle("hidden", !meaningsVisible);
        });
        toggleButton.textContent = meaningsVisible ? "Hide Meanings" : "Show Meanings";
      });
    }

    document.getElementById("start-practice-button").addEventListener("click", async () => {
      const category = document.getElementById("practice-category").value;
      const count = Number(document.getElementById("practice-count").value || "3");
      if (!category) {
        alert("Select a category.");
        return;
      }
      if (Number.isNaN(count) || count < 3 || count > 20) {
        alert("Count must be between 3 and 20.");
        return;
      }

      try {
        const result = await fetchPracticeWords(category, count);
        currentCategory = result.category;
        currentWords = result.words || [];
        renderPracticeWords(currentWords, currentCategory);
      } catch (error) {
        alert(error.message);
      }
    });

    (async () => {
      if (!requireAuth()) return;
      try {
        categoryStats = await fetchCategories();
        renderCategorySelect();
      } catch (error) {
        document.getElementById("practice-result").innerHTML =
          `<p class="text-sm text-red-600">${error.message}</p>`;
      }
    })();
  </script>
</body>
</html>
