<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LingoCalm - Login</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    body {
      font-family: "Lexend", sans-serif;
      background: #f8f3e1;
      color: #2d3327;
      min-height: 100dvh;
    }
  </style>
</head>
<body class="flex items-center justify-center p-6">
  <main class="w-full max-w-md rounded-2xl bg-white/60 border border-[#aeb784]/20 p-6 shadow-sm">
    <h1 class="text-3xl font-bold mb-2">LingoCalm</h1>
    <p class="text-sm text-[#2d3327]/70 mb-6">Sign in to manage your vocabulary.</p>

    <form id="login-form" class="space-y-4">
      <div>
        <label for="email" class="block text-sm font-semibold mb-1">Email</label>
        <input
          id="email"
          type="email"
          placeholder="hello@example.com"
          class="w-full rounded-xl border-[#aeb784]/30 bg-white"
          required
        />
      </div>
      <div>
        <label for="password" class="block text-sm font-semibold mb-1">Password</label>
        <input
          id="password"
          type="password"
          placeholder="Enter your password"
          class="w-full rounded-xl border-[#aeb784]/30 bg-white"
          required
        />
      </div>
      <button
        type="submit"
        class="w-full rounded-xl bg-[#aeb784] py-3 text-white font-semibold hover:brightness-95"
      >
        Sign In
      </button>
    </form>

    <p class="text-sm mt-4 text-center">
      No account?
      <a href="/register" class="font-semibold text-[#7e8959] hover:underline">Create one</a>
    </p>
  </main>

  <script>
    const API_BASE = window.location.origin;

    function parseError(data, fallback) {
      if (!data) return fallback;
      if (typeof data.detail === "string") return data.detail;
      if (Array.isArray(data.detail)) return data.detail[0]?.msg || fallback;
      return fallback;
    }

    async function login(email, password) {
      const response = await fetch(`${API_BASE}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });

      let data = null;
      try {
        data = await response.json();
      } catch (_) {
        data = null;
      }

      if (!response.ok) {
        throw new Error(parseError(data, "Login failed"));
      }

      localStorage.setItem("token", data.access_token);
      window.location.href = "/dashboard";
    }

    document.getElementById("login-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        alert("Email and password are required.");
        return;
      }

      try {
        await login(email, password);
      } catch (error) {
        alert(error.message);
      }
    });
  </script>
</body>
</html>
