<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LingoCalm - Dashboard</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    body {
      font-family: "Lexend", sans-serif;
      background: #f8f3e1;
      color: #2d3327;
      min-height: 100dvh;
    }
  </style>
</head>
<body class="max-w-3xl mx-auto px-5 py-6">
  <header class="flex items-center justify-between mb-6">
    <div>
      <p class="text-xs uppercase tracking-widest text-[#7e8959] font-semibold">LingoCalm</p>
      <h1 class="text-3xl font-bold">Your Categories</h1>
    </div>
    <button
      id="logout-button"
      class="rounded-lg border border-[#aeb784]/40 px-3 py-2 text-sm font-semibold text-[#55603d] hover:bg-white/40"
    >
      Logout
    </button>
  </header>

  <section class="mb-4 flex items-center justify-between">
    <h2 class="text-lg font-semibold">Vocabulary Library</h2>
    <div class="flex items-center gap-2">
      <a
        href="/practice"
        class="rounded-xl border border-[#aeb784]/40 px-4 py-2 text-sm font-semibold text-[#55603d] hover:bg-white/40"
      >
        Practice
      </a>
      <a
        href="/word-add"
        class="rounded-xl bg-[#aeb784] px-4 py-2 text-sm font-semibold text-white hover:brightness-95"
      >
        + Add Word
      </a>
    </div>
  </section>

  <section id="category-list" class="space-y-3">
    <p class="text-sm text-[#2d3327]/70">Loading categories...</p>
  </section>

  <script>
    const API_BASE = window.location.origin;

    function getToken() {
      return localStorage.getItem("token");
    }

    function requireAuth() {
      if (!getToken()) {
        window.location.href = "/login";
        return false;
      }
      return true;
    }

    function authHeaders() {
      return { Authorization: `Bearer ${getToken()}` };
    }

    function parseError(data, fallback) {
      if (!data) return fallback;
      if (typeof data.detail === "string") return data.detail;
      if (Array.isArray(data.detail)) return data.detail[0]?.msg || fallback;
      return fallback;
    }

    function displayName(name) {
      if (!name) return "";
      return name.charAt(0).toUpperCase() + name.slice(1);
    }

    function renderCategories(categories) {
      const container = document.getElementById("category-list");

      if (!categories.length) {
        container.innerHTML = `
          <div class="rounded-2xl border border-dashed border-[#aeb784]/50 bg-white/40 p-6 text-center">
            <p class="font-semibold mb-2">No words yet</p>
            <p class="text-sm text-[#2d3327]/70 mb-4">Add your first word to create categories automatically.</p>
            <a href="/word-add" class="inline-block rounded-xl bg-[#aeb784] px-4 py-2 text-sm font-semibold text-white">Add First Word</a>
          </div>
        `;
        return;
      }

      container.innerHTML = categories
        .map(
          (category) => `
            <button
              class="w-full rounded-xl border border-[#aeb784]/30 bg-white/60 px-4 py-4 text-left hover:bg-white"
              onclick="openCategory('${category.name}')"
            >
              <div class="flex items-center justify-between">
                <span class="font-semibold">${displayName(category.name)}</span>
                <span class="text-sm text-[#7e8959]">${category.count} words</span>
              </div>
            </button>
          `
        )
        .join("");
    }

    async function loadCategories() {
      const response = await fetch(`${API_BASE}/categories`, { headers: authHeaders() });

      let data = null;
      try {
        data = await response.json();
      } catch (_) {
        data = null;
      }

      if (!response.ok) {
        throw new Error(parseError(data, "Failed to load categories"));
      }

      return data;
    }

    function openCategory(name) {
      const encoded = encodeURIComponent(name);
      window.location.href = `/word-list?name=${encoded}`;
    }

    document.getElementById("logout-button").addEventListener("click", () => {
      localStorage.removeItem("token");
      window.location.href = "/login";
    });

    (async () => {
      if (!requireAuth()) return;
      try {
        const categories = await loadCategories();
        renderCategories(categories);
      } catch (error) {
        document.getElementById("category-list").innerHTML =
          `<p class="text-sm text-red-600">${error.message}</p>`;
      }
    })();
  </script>
</body>
</html>
